<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced OCR System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .upload-section {
            background: #1a1a2e;
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-section:hover,
        .upload-section.dragover {
            border-color: #667eea;
            background: #1e1e3a;
        }

        .upload-section svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            color: #667eea;
        }

        .upload-section h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-section p {
            color: #666;
            font-size: 0.85rem;
        }

        #file-input {
            display: none;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls select,
        .controls button {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .controls select:hover,
        .controls button:hover {
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            border: none !important;
            font-weight: 600;
            min-width: 160px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: #1a3a1a !important;
            border-color: #2a6a2a !important;
        }

        .btn-download:hover {
            background: #2a4a2a !important;
        }

        .file-info {
            display: none;
            margin-top: 16px;
            padding: 12px 20px;
            background: #16213e;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .file-info.show {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-info .remove-btn {
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
            background: none;
        }

        .progress-bar {
            display: none;
            margin-top: 20px;
            height: 4px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 80%; }
            100% { width: 100%; }
        }

        .status-msg {
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #888;
            display: none;
        }

        .status-msg.show {
            display: block;
        }

        .result-section {
            display: none;
            margin-top: 32px;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-header h2 {
            font-size: 1.3rem;
            color: #667eea;
        }

        .result-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .meta-badge {
            padding: 4px 12px;
            background: #16213e;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #8899aa;
        }

        .meta-badge.engine {
            background: #1a2a4a;
            color: #667eea;
        }

        .meta-badge.handwritten {
            background: #3a1a2a;
            color: #ea6688;
        }

        .result-text {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 24px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 500px;
            overflow-y: auto;
            color: #d0d0d0;
        }

        .result-text::-webkit-scrollbar {
            width: 6px;
        }

        .result-text::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .result-text::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .error-msg {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #2a1a1a;
            border: 1px solid #4a2a2a;
            border-radius: 8px;
            color: #e74c3c;
            font-size: 0.9rem;
        }

        .error-msg.show {
            display: block;
        }

        .preview-section {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        .preview-section.show {
            display: block;
        }

        .preview-section img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: #444;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container { padding: 20px 12px; }
            header h1 { font-size: 1.6rem; }
            .upload-section { padding: 30px 16px; }
            .controls { flex-direction: column; }
            .controls select, .controls button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Advanced OCR System</h1>
            <p>PaddleOCR + TrOCR + Tesseract | Handwritten & Printed Text | Multilingual</p>
        </header>

        <div class="upload-section" id="upload-area">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
            </svg>
            <h3>Upload Image or PDF</h3>
            <p>Drag & drop or click to select | PNG, JPEG, BMP, TIFF, WebP, PDF</p>
            <input type="file" id="file-input" accept="image/*,.pdf">
        </div>

        <div class="file-info" id="file-info">
            <span id="file-name"></span>
            <button class="remove-btn" onclick="removeFile()">Remove</button>
        </div>

        <div class="preview-section" id="preview-section">
            <img id="preview-img" alt="Preview">
        </div>

        <div class="controls">
            <select id="engine-select">
                <option value="smart">Smart Routing (Auto)</option>
                <option value="paddle">PaddleOCR Only</option>
                <option value="trocr">TrOCR Only (Handwritten)</option>
                <option value="tesseract">Tesseract Only (Printed)</option>
            </select>
            <button class="btn-primary" id="ocr-btn" onclick="runOCR()" disabled>Extract Text</button>
            <button class="btn-download controls-btn" id="download-btn" onclick="downloadText()" style="display:none;">
                Download .txt
            </button>
        </div>

        <div class="progress-bar" id="progress-bar">
            <div class="fill"></div>
        </div>

        <div class="status-msg" id="status-msg"></div>
        <div class="error-msg" id="error-msg"></div>

        <div class="result-section" id="result-section">
            <div class="result-header">
                <h2>Extracted Text</h2>
            </div>
            <div class="result-meta" id="result-meta"></div>
            <div class="result-text" id="result-text"></div>
        </div>

        <footer>
            <p>Advanced OCR System v1.0 | PaddleOCR + TrOCR + Tesseract</p>
        </footer>
    </div>

    <script>
        let selectedFile = null;
        let extractedText = '';

        // Drag & drop
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            document.getElementById('file-name').textContent =
                `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            document.getElementById('file-info').classList.add('show');
            document.getElementById('ocr-btn').disabled = false;
            hideError();

            // Show image preview
            const previewSection = document.getElementById('preview-section');
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview-img').src = e.target.result;
                    previewSection.classList.add('show');
                };
                reader.readAsDataURL(file);
            } else {
                previewSection.classList.remove('show');
            }
        }

        function removeFile() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('file-info').classList.remove('show');
            document.getElementById('preview-section').classList.remove('show');
            document.getElementById('ocr-btn').disabled = true;
            document.getElementById('result-section').classList.remove('show');
            document.getElementById('download-btn').style.display = 'none';
            hideError();
        }

        async function runOCR() {
            if (!selectedFile) return;

            const btn = document.getElementById('ocr-btn');
            const progressBar = document.getElementById('progress-bar');
            const statusMsg = document.getElementById('status-msg');
            const engine = document.getElementById('engine-select').value;

            btn.disabled = true;
            btn.textContent = 'Processing...';
            progressBar.classList.add('show');
            statusMsg.textContent = 'Uploading and processing... This may take a moment.';
            statusMsg.classList.add('show');
            hideError();
            document.getElementById('result-section').classList.remove('show');
            document.getElementById('download-btn').style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const url = `/ocr?engine=${engine}&smart_routing=${engine === 'smart'}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || `Server error: ${response.status}`);
                }

                const data = await response.json();
                displayResult(data);
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Extract Text';
                progressBar.classList.remove('show');
                statusMsg.classList.remove('show');
            }
        }

        function displayResult(data) {
            const resultSection = document.getElementById('result-section');
            const resultText = document.getElementById('result-text');
            const resultMeta = document.getElementById('result-meta');

            const result = data.result || {};
            extractedText = result.text || 'No text detected.';

            resultText.textContent = extractedText;

            // Meta badges
            let metaHTML = '';
            metaHTML += `<span class="meta-badge">${data.file_type?.toUpperCase() || 'IMAGE'}</span>`;
            if (data.pages) {
                metaHTML += `<span class="meta-badge">${data.pages} page(s)</span>`;
            }

            const engines = result.engines_used || [result.engine || 'PaddleOCR'];
            engines.forEach(eng => {
                metaHTML += `<span class="meta-badge engine">${eng}</span>`;
            });

            if (result.handwritten_detected) {
                metaHTML += `<span class="meta-badge handwritten">Handwritten Detected</span>`;
            }

            resultMeta.innerHTML = metaHTML;
            resultSection.classList.add('show');
            document.getElementById('download-btn').style.display = 'inline-block';
        }

        function downloadText() {
            if (!extractedText) return;
            const blob = new Blob([extractedText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ocr_output.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showError(message) {
            const el = document.getElementById('error-msg');
            el.textContent = message;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-msg').classList.remove('show');
        }
    </script>
</body>
</html>
